name: Lobby-AI Cloud Engine

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  build-and-scout:
    runs-on: ubuntu-latest
    
    # This grants the bot permission to write to your job_database.csv
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Libraries
        run: |
          pip install -r requirements.txt
          playwright install chromium # Required for stealth scouting

      - name: 4. Run the Scout
        run: python scout.py

      - name: 5. Sync Data to GitHub
        run: |
          git config --global user.name 'Lobby-AI-Bot'
          git config --global user.email 'bot@lobby-ai.com'
          git add job_database.csv
          git commit -m "Auto-update: New IT Head roles synced" || exit 0
          git push
