name: Lobby-AI Cloud Engine

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours automatically
  workflow_dispatch:      # <--- THIS LINE CREATES THE "RUN WORKFLOW" BUTTON

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install Libraries
        run: |
          pip install pandas requests beautifulsoup4

      - name: 4. Run the Scout
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scout.py

      - name: 5. Save Findings
        run: |
          git config --global user.name "Lobby-AI-Bot"
          git config --global user.email "bot@lobby-ai.com"
          git add job_database.csv
          git commit -m "Scout updated the database" || echo "No changes to commit"
          git push
